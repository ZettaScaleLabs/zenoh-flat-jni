[package]
name = "zenoh-flat-jni"
version = "1.9.0"
edition = "2021"
description = "Zenoh JNI bindings and Kotlin wrappers - generated from zenoh-flat via prebindgen"
license = "EPL-2.0 OR Apache-2.0"
repository = "https://github.com/ZettaScaleLabs/zenoh-flat-jni"
homepage = "https://zenoh.io"

[features]
default = ["zenoh-ext"]
# Gates the hand-written ZBytes serialization JNI (src/zbytes.rs), which needs
# zenoh-ext's serializer/deserializer.
zenoh-ext = ["dep:zenoh-ext"]

[dependencies]
# `unstable` must be on to match the `unstable` zenoh features enabled below:
# zenoh-flat's `unstable` feature (= `zenoh/unstable`) gates the QoS surface
# (`Reliability`, `CongestionControl::BlockFirst`, …) in lockstep with the
# zenoh enum variants, so without it the flat↔native conversions go
# non-exhaustive once Cargo unifies `zenoh` with `unstable`.
# TODO: Once zenoh-flat is published to crates.io, replace path dep with: { version = "1.9.0", features = ["unstable"] }
zenoh-flat = { version = "1.9.0", path = "../zenoh-flat", features = ["unstable"] }
# Runtime home of the JNI binding helpers and the default `JniBindingError`
# (`::prebindgen::lang::JniBindingError`) that the generated bindings reference.
# TODO: Once prebindgen is published to crates.io, replace path dep with version constraint
prebindgen = { path = "../prebindgen/prebindgen" }
# Direct zenoh/zenoh-ext deps for the self-contained ZBytes serialization JNI.
# Same git rev as zenoh-flat so Cargo unifies the crate instances.
zenoh = { version = "1.9.0", git = "https://github.com/eclipse-zenoh/zenoh.git", branch = "main", features = ["unstable", "internal", "default"], default-features = false }
zenoh-ext = { version = "1.9.0", git = "https://github.com/eclipse-zenoh/zenoh.git", branch = "main", features = ["internal"], default-features = false, optional = true }
jni = "0.21.1"
konst = "0.3.17"
tracing = { version = "0.1", features = ["log"] }

[lib]
name = "zenoh_flat_jni"
crate-type = ["staticlib", "dylib"]

[build-dependencies]
# Same feature set as the runtime dep so the captured `FEATURES` / cfg-gated
# `#[prebindgen]` items match what the runtime crate actually compiles.
# TODO: Once zenoh-flat and prebindgen are published, update to version constraints
zenoh-flat = { version = "1.9.0", path = "../zenoh-flat", features = ["unstable"] }
prebindgen = { path = "../prebindgen/prebindgen" }
syn = "2"

# panic = "abort" is required on the JNI boundary — a Rust panic crossing
# into the JVM under unwind is UB.
[profile.release]
debug = false
lto = "fat"
codegen-units = 1
opt-level = 3
panic = "abort"