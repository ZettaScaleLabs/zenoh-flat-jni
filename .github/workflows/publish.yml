name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Build Rust library
        run: cargo build --release

      - name: Setup GPG
        run: |
          mkdir -p ~/.gnupg
          echo "${{ secrets.ORG_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "${{ secrets.ORG_GPG_PASSPHRASE }}" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --list-secret-keys

      - name: Build and publish JAR
        run: ./gradlew publish --no-parallel -DremotePublication=true -Drelease=true
        env:
          ORG_GPG_SUBKEY_ID: ${{ secrets.ORG_GPG_SUBKEY_ID }}
          ORG_GPG_PRIVATE_KEY: ${{ secrets.ORG_GPG_PRIVATE_KEY }}
          ORG_GPG_PASSPHRASE: ${{ secrets.ORG_GPG_PASSPHRASE }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          draft: false
          prerelease: false
