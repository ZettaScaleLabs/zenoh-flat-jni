name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zenoh-flat-jni
    steps:
      - uses: actions/checkout@v4
        with:
          path: zenoh-flat-jni

      # zenoh-flat remains a sibling path dependency until it is published.
      - name: Check out zenoh-flat
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat
          ref: 5ffb957b1f18c26be183fe3bf22a08ba93575f12
          path: zenoh-flat

      - name: Use prebindgen from GitHub main
        shell: bash
        run: |
          sed -i.bak \
            -e 's|prebindgen = { path = "../prebindgen/prebindgen" }|prebindgen = { git = "https://github.com/milyin/prebindgen.git", branch = "main" }|g' \
            -e 's|prebindgen-proc-macro = { path = "../prebindgen/prebindgen-proc-macro",|prebindgen-proc-macro = { git = "https://github.com/milyin/prebindgen.git", branch = "main",|g' \
            Cargo.toml ../zenoh-flat/Cargo.toml
          rm Cargo.toml.bak ../zenoh-flat/Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: zenoh-flat-jni/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('zenoh-flat-jni/Cargo.toml', 'zenoh-flat-jni/Cargo.lock', 'zenoh-flat/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run format check
        run: cargo fmt --check -- --config "unstable_features=true,imports_granularity=Crate,group_imports=StdExternalCrate"

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: zenoh-flat-jni
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: zenoh-flat-jni

      - name: Check out zenoh-flat
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat
          ref: 5ffb957b1f18c26be183fe3bf22a08ba93575f12
          path: zenoh-flat

      - name: Use prebindgen from GitHub main
        shell: bash
        run: |
          sed -i.bak \
            -e 's|prebindgen = { path = "../prebindgen/prebindgen" }|prebindgen = { git = "https://github.com/milyin/prebindgen.git", branch = "main" }|g' \
            -e 's|prebindgen-proc-macro = { path = "../prebindgen/prebindgen-proc-macro",|prebindgen-proc-macro = { git = "https://github.com/milyin/prebindgen.git", branch = "main",|g' \
            Cargo.toml ../zenoh-flat/Cargo.toml
          rm Cargo.toml.bak ../zenoh-flat/Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: zenoh-flat-jni/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('zenoh-flat-jni/Cargo.toml', 'zenoh-flat-jni/Cargo.lock', 'zenoh-flat/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run tests
        run: cargo test --all --all-features --verbose

  gradle-test:
    name: Gradle test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: zenoh-flat-jni
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: zenoh-flat-jni

      - name: Check out zenoh-flat
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat
          ref: 5ffb957b1f18c26be183fe3bf22a08ba93575f12
          path: zenoh-flat

      - name: Use prebindgen from GitHub main
        shell: bash
        run: |
          sed -i.bak \
            -e 's|prebindgen = { path = "../prebindgen/prebindgen" }|prebindgen = { git = "https://github.com/milyin/prebindgen.git", branch = "main" }|g' \
            -e 's|prebindgen-proc-macro = { path = "../prebindgen/prebindgen-proc-macro",|prebindgen-proc-macro = { git = "https://github.com/milyin/prebindgen.git", branch = "main",|g' \
            Cargo.toml ../zenoh-flat/Cargo.toml
          rm Cargo.toml.bak ../zenoh-flat/Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: zenoh-flat-jni/target
          key: ${{ runner.os }}-gradle-test-target-${{ hashFiles('zenoh-flat-jni/Cargo.toml', 'zenoh-flat-jni/Cargo.lock', 'zenoh-flat/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-test-target-

      # Runs the Kotlin correspondence tests: each verifies a pure-Kotlin
      # implementation (Parameters, SerializationCodec, EncodingCodec, ZenohId)
      # against the native oracle in `io.zenoh.jni.test`. The `test` task builds
      # the native lib (dependsOn buildZenohFlatJni) and puts it on
      # java.library.path, so no separate cargo build step is needed.
      - name: Run Gradle tests
        run: gradle test --info

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: zenoh-flat-jni
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: zenoh-flat-jni

      - name: Check out zenoh-flat
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat
          ref: 5ffb957b1f18c26be183fe3bf22a08ba93575f12
          path: zenoh-flat

      - name: Use prebindgen from GitHub main
        shell: bash
        run: |
          sed -i.bak \
            -e 's|prebindgen = { path = "../prebindgen/prebindgen" }|prebindgen = { git = "https://github.com/milyin/prebindgen.git", branch = "main" }|g' \
            -e 's|prebindgen-proc-macro = { path = "../prebindgen/prebindgen-proc-macro",|prebindgen-proc-macro = { git = "https://github.com/milyin/prebindgen.git", branch = "main",|g' \
            Cargo.toml ../zenoh-flat/Cargo.toml
          rm Cargo.toml.bak ../zenoh-flat/Cargo.toml.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: zenoh-flat-jni/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('zenoh-flat-jni/Cargo.toml', 'zenoh-flat-jni/Cargo.lock', 'zenoh-flat/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Build release
        run: cargo build --release
